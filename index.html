<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ランダム画像ビューワー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f10;
  --surface: #1a1a1d;
  --surface2: #232327;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.16);
  --text: #e8e8ea;
  --text2: #888890;
  --text3: #555560;
  --accent: #7c6af7;
  --accent2: #a396fa;
  --danger: #f05c5c;
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Hiragino Sans', 'Meiryo', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== SETUP SCREEN ===== */
#setup-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 24px;
}
#setup-screen.hidden { display: none; }

.setup-card {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius);
  padding: 32px 28px;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.setup-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.setup-logo .icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: rgba(124,106,247,0.18);
  border: 1px solid rgba(124,106,247,0.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.setup-logo h1 { font-size: 18px; font-weight: 700; }
.setup-logo p { font-size: 12px; color: var(--text2); margin-top: 2px; }

.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.04em; }
.field input {
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  padding: 12px 14px;
  width: 100%;
  outline: none;
  font-family: 'Courier New', monospace;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text3); font-family: 'Hiragino Sans', sans-serif; }
.field .hint { font-size: 11px; color: var(--text3); line-height: 1.6; }
.field .hint a { color: var(--accent2); text-decoration: none; }

#setup-error {
  font-size: 12px;
  color: var(--danger);
  background: rgba(240,92,92,0.1);
  border: 0.5px solid rgba(240,92,92,0.3);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: none;
}

.setup-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 13px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  width: 100%;
}
.setup-btn:hover { opacity: 0.88; }
.setup-btn:active { transform: scale(0.98); }
.setup-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ===== LOADING OVERLAY ===== */
#loading {
  position: fixed;
  inset: 0;
  background: rgba(15,15,16,0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 50;
}
#loading.hidden { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-msg { font-size: 14px; color: var(--text2); }

/* ===== HEADER ===== */
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 0.5px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  min-height: 48px;
}
header h1 { font-size: 13px; font-weight: 700; flex: 1; }
header h1 span { color: var(--accent2); }
#folder-badge {
  font-size: 11px;
  color: var(--text2);
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 3px 10px;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#btn-settings {
  background: transparent;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text2);
  padding: 6px 8px;
  cursor: pointer;
  display: flex; align-items: center;
  transition: background 0.15s;
}
#btn-settings:hover { background: var(--surface2); color: var(--text); }

/* ===== MAIN ===== */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: 200px;
  min-width: 200px;
  border-right: 0.5px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

/* iPad: サイドバーを隠す */
@media (max-width: 700px) {
  #sidebar { display: none; }
  #mobile-bar { display: flex !important; }
}

.sb-section {
  padding: 12px 13px;
  border-bottom: 0.5px solid var(--border);
}
.sb-section h2 {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 9px;
}
.stat-row { display: flex; justify-content: space-between; padding: 3px 0; }
.stat-row label { font-size: 12px; color: var(--text2); }
.stat-row span { font-size: 12px; font-weight: 700; color: var(--text); }

.ctrl-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 8px 10px;
  margin-bottom: 5px;
  font-size: 12px;
  color: var(--text);
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
  text-align: left;
}
.ctrl-btn:last-child { margin-bottom: 0; }
.ctrl-btn:hover { background: rgba(124,106,247,0.14); border-color: rgba(124,106,247,0.4); }
.ctrl-btn:active { transform: scale(0.98); }
.ctrl-btn.active { background: rgba(124,106,247,0.2); border-color: var(--accent); color: var(--accent2); }

.slider-row { display: flex; flex-direction: column; gap: 7px; }
.slider-row .row { display: flex; justify-content: space-between; }
.slider-row label { font-size: 12px; color: var(--text2); }
.slider-row .val { font-size: 12px; font-weight: 700; color: var(--accent2); }

input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px;
  border-radius: 2px;
  background: var(--surface2);
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

#history-section {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
  padding: 12px 13px;
}
#history-section h2 {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; color: var(--text3);
  text-transform: uppercase; margin-bottom: 9px; flex-shrink: 0;
}
#history-list {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 3px;
}
#history-list::-webkit-scrollbar { width: 3px; }
#history-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.hist-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 6px; border-radius: 6px; cursor: pointer;
  border: 0.5px solid transparent; transition: background 0.12s;
}
.hist-item:hover { background: var(--surface2); }
.hist-item.active { background: rgba(124,106,247,0.14); border-color: rgba(124,106,247,0.3); }
.hist-item img { width: 34px; height: 34px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--surface2); }
.hist-item .hi-name { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-item.active .hi-name { color: var(--accent2); }

/* ===== CENTER ===== */
#center {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}

#img-stage {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; background: var(--bg);
  position: relative; cursor: pointer;
  height: 65vh; min-height: 120px;
}
#main-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: block;
  opacity: 0; transition: opacity 0.3s ease;
  user-select: none; pointer-events: none;
  -webkit-user-drag: none;
}
#main-img.loaded { opacity: 1; }

#img-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  background: linear-gradient(transparent, rgba(0,0,0,0.65));
  display: flex; justify-content: space-between; align-items: flex-end;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#img-stage:hover #img-overlay,
#img-stage:active #img-overlay { opacity: 1; }
#img-path { font-size: 11px; color: rgba(255,255,255,0.8); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 8px; }
#img-counter { font-size: 11px; color: rgba(255,255,255,0.6); white-space: nowrap; }

/* resize handle */
#resize-handle {
  height: 8px; background: transparent; cursor: ns-resize;
  position: relative; flex-shrink: 0; z-index: 10;
  touch-action: none;
}
#resize-handle::after {
  content: ''; position: absolute;
  left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: 36px; height: 3px; border-radius: 2px;
  background: var(--border2); transition: background 0.2s;
}
#resize-handle:hover::after { background: var(--accent); }

/* filmstrip */
#filmstrip-wrap {
  flex: 1; min-height: 70px; max-height: 110px;
  display: flex; align-items: center;
  padding: 8px 12px; gap: 6px;
  background: var(--surface);
  border-top: 0.5px solid var(--border);
  overflow: hidden;
}
#filmstrip {
  display: flex; gap: 5px; overflow-x: auto;
  padding: 2px 0; flex: 1;
  -webkit-overflow-scrolling: touch;
}
#filmstrip::-webkit-scrollbar { height: 3px; }
#filmstrip::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.fs-thumb {
  flex-shrink: 0; width: 52px; height: 52px;
  object-fit: cover; border-radius: 6px; cursor: pointer;
  border: 1.5px solid transparent; opacity: 0.45;
  transition: opacity 0.15s, border-color 0.15s;
  background: var(--surface2);
  -webkit-user-drag: none;
}
.fs-thumb:hover { opacity: 0.85; }
.fs-thumb.active { border-color: var(--accent); opacity: 1; }
.fs-nav {
  background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  cursor: pointer; padding: 8px 9px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s; -webkit-tap-highlight-color: transparent;
}
.fs-nav:hover { background: rgba(124,106,247,0.2); }
.fs-nav:active { transform: scale(0.96); }

/* ===== MOBILE BOTTOM BAR ===== */
#mobile-bar {
  display: none;
  background: var(--surface);
  border-top: 0.5px solid var(--border);
  padding: 8px 16px 12px;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  flex-shrink: 0;
}
.mb-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 14px; font-size: 13px; font-weight: 600;
  border-radius: var(--radius-sm); cursor: pointer;
  border: 0.5px solid var(--border2);
  background: var(--surface2); color: var(--text);
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.mb-btn:active { transform: scale(0.97); }
.mb-btn.active { background: rgba(124,106,247,0.2); border-color: var(--accent); color: var(--accent2); }
#mb-speed-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
#mb-speed-wrap label { font-size: 12px; color: var(--text2); }
#mb-speed-range { width: 80px; }

/* welcome */
#welcome {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  pointer-events: none; z-index: 3;
}
#welcome.hidden { display: none; }
#welcome .w-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(124,106,247,0.12);
  border: 1px solid rgba(124,106,247,0.25);
  display: flex; align-items: center; justify-content: center;
}
#welcome h2 { font-size: 16px; font-weight: 700; }
#welcome p { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.8; }
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">
      <div class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a396fa" stroke-width="1.8">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div>
        <h1>ランダム画像ビューワー</h1>
        <p>Dropbox連携 · iPad対応</p>
      </div>
    </div>

    <div class="field">
      <label>DROPBOX アクセストークン</label>
      <input type="password" id="input-token" placeholder="sl.xxxxxxxxxxxxxxxxxxxx" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="hint">
        <a href="https://www.dropbox.com/developers/apps" target="_blank">dropbox.com/developers/apps</a> でアプリを作成し、Settingsタブの「Generated access token」から取得してください。
      </div>
    </div>

    <div class="field">
      <label>画像フォルダのパス</label>
      <input type="text" id="input-folder" placeholder="例: /写真  または  /vacation/2024" autocomplete="off">
      <div class="hint">Dropbox内のフォルダパス。ルート全体を使う場合は「/」と入力。サブフォルダも自動で検索します。</div>
    </div>

    <div id="setup-error"></div>

    <button class="setup-btn" id="btn-connect" onclick="connect()">接続して開始</button>
  </div>
</div>

<!-- ===== LOADING ===== -->
<div id="loading" class="hidden">
  <div class="spinner"></div>
  <div id="loading-msg">Dropboxに接続中...</div>
</div>

<!-- ===== HEADER ===== -->
<header>
  <h1>&#127914; Random <span>Viewer</span></h1>
  <div id="folder-badge">未接続</div>
  <button id="btn-settings" onclick="showSetup()" title="設定">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>

<!-- ===== MAIN ===== -->
<div id="main">
  <!-- SIDEBAR (PC) -->
  <div id="sidebar">
    <div class="sb-section">
      <h2>統計</h2>
      <div class="stat-row"><label>総画像数</label><span id="s-total">—</span></div>
      <div class="stat-row"><label>フォルダ数</label><span id="s-folders">—</span></div>
      <div class="stat-row"><label>表示済み</label><span id="s-shown">—</span></div>
      <div class="stat-row"><label>現在位置</label><span id="s-cur">—</span></div>
    </div>
    <div class="sb-section">
      <h2>操作</h2>
      <button class="ctrl-btn" onclick="shuffleAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        シャッフル
      </button>
      <button class="ctrl-btn" id="btn-auto-sb" onclick="toggleAuto()">
        <svg id="auto-icon-sb" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        自動スライドショー
      </button>
    </div>
    <div class="sb-section">
      <h2>速度</h2>
      <div class="slider-row">
        <div class="row"><label>間隔</label><span class="val"><span id="speed-val">3</span>秒</span></div>
        <input type="range" id="speed-range" min="1" max="15" value="3" step="1" oninput="updateSpeed(this.value)">
      </div>
    </div>
    <div class="sb-section">
      <h2>表示サイズ</h2>
      <div class="slider-row">
        <div class="row"><label>高さ</label><span class="val" id="size-val">65%</span></div>
        <input type="range" id="size-range" min="20" max="92" value="65" step="1" oninput="updateSize(this.value)">
      </div>
    </div>
    <div id="history-section">
      <h2>履歴</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="img-stage" onclick="nextImg()">
      <img id="main-img" alt="">
      <div id="img-overlay">
        <span id="img-path"></span>
        <span id="img-counter"></span>
      </div>
      <!-- welcome -->
      <div id="welcome">
        <div class="w-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a396fa" stroke-width="1.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h2>Dropboxに接続してください</h2>
        <p>左上の設定ボタンから<br>トークンとフォルダを入力</p>
      </div>
    </div>

    <!-- resize handle -->
    <div id="resize-handle" title="ドラッグして高さ調整"></div>

    <!-- filmstrip -->
    <div id="filmstrip-wrap">
      <button class="fs-nav" onclick="prevImg()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div id="filmstrip"></div>
      <button class="fs-nav" onclick="nextImg()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ===== MOBILE BOTTOM BAR (iPad) ===== -->
<div id="mobile-bar">
  <button class="mb-btn" onclick="prevImg()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    前へ
  </button>
  <button class="mb-btn" onclick="nextImg()">
    次へ
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button class="mb-btn" onclick="shuffleAll()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
    シャッフル
  </button>
  <button class="mb-btn" id="btn-auto-mb" onclick="toggleAuto()">
    <svg id="auto-icon-mb" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    自動
  </button>
  <div id="mb-speed-wrap">
    <label><span id="mb-speed-val">3</span>秒</label>
    <input type="range" id="mb-speed-range" min="1" max="15" value="3" step="1" oninput="updateSpeed(this.value); document.getElementById('mb-speed-val').textContent=this.value">
  </div>
</div>

<script>
// ===== STATE =====
const DROPBOX_API = 'https://api.dropboxapi.com/2';
const DROPBOX_CONTENT = 'https://content.dropboxapi.com/2';
const IMG_EXT = new Set(['jpg','jpeg','png','gif','webp','bmp','avif','heic','heif']);
const BATCH_SIZE = 2000; // 一度に保持するファイルリストの上限

let token = '';
// files は {path, name} の配列。全件保持せず最大 BATCH_SIZE 件まで
let files = [];
// 表示用のランダムキュー（インデックス）
let queue = [];
let queuePos = 0;
let shown = 0;
let history = [], histIdx = -1;
let autoTimer = null, autoSpeed = 3000;
let folderCount = 0;
let urlCache = new Map();

// スキャン状態
let scanCursor = null;
let scanDone = false;
let scanRunning = false;
let scanFolder = '';
let totalFound = 0; // 実際に見つかった総数（files配列はBATCH_SIZEで打ち切り）

// ===== SETUP =====
function showSetup() { document.getElementById('setup-screen').classList.remove('hidden'); }
function hideSetup() { document.getElementById('setup-screen').classList.add('hidden'); }

async function connect() {
  const t = document.getElementById('input-token').value.trim();
  const f = document.getElementById('input-folder').value.trim() || '/';
  document.getElementById('setup-error').style.display = 'none';
  if (!t) { showError('アクセストークンを入力してください。'); return; }

  token = t;
  const btn = document.getElementById('btn-connect');
  btn.disabled = true; btn.textContent = '接続中...';

  try {
    // トークン確認
    let check;
    try {
      check = await dbFetch(DROPBOX_API + '/users/get_current_account', {}, 'POST');
    } catch(fetchErr) {
      // fetch自体が失敗＝CORSかネットワークエラー
      throw new Error(
        'APIに接続できませんでした。\n' +
        '原因: ' + (fetchErr.message || 'ネットワークエラー') + '\n' +
        'ヒント: このHTMLをブラウザで直接開いている場合、ChromeまたはEdgeでお試しください。'
      );
    }

    if (!check.ok) {
      let detail = 'HTTPステータス: ' + check.status;
      try { const j = await check.json(); detail = j.error_summary || detail; } catch(_) {}
      if (check.status === 400 || check.status === 401) {
        throw new Error('トークンが無効または期限切れです。\nDropbox Developersで新しいトークンを生成してください。\n(' + detail + ')');
      }
      throw new Error('認証エラー: ' + detail);
    }

    hideSetup();
    showLoading('画像を検索中...');

    files = []; queue = []; queuePos = 0; shown = 0;
    history = []; histIdx = -1; totalFound = 0; folderCount = 0;
    scanCursor = null; scanDone = false;
    clearCache();
    scanFolder = (f === '/') ? '' : f;

    await fetchOnePage();

    if (!files.length) {
      hideLoading();
      showError('画像が見つかりませんでした。\nフォルダパスを確認してください（例: /写真）\n対応形式: JPG, PNG, GIF, WebP, HEIC など');
      showSetup();
      return;
    }

    document.getElementById('welcome').classList.add('hidden');
    hideLoading();
    buildQueue();
    updateFolderBadge();
    updateStats();
    showCurrent();

    if (!scanDone) bgScan();

  } catch(e) {
    hideLoading();
    // セットアップ画面を先に表示してからエラーを出す
    showSetup();
    showError(e.message || '不明なエラーが発生しました。ブラウザの開発者ツール(F12)のConsoleタブも確認してください。');
    console.error('[Dropbox Viewer] connect error:', e);
  } finally {
    btn.disabled = false; btn.textContent = '接続して開始';
  }
}

// 1ページ取得
async function fetchOnePage() {
  const url = scanCursor
    ? DROPBOX_API + '/files/list_folder/continue'
    : DROPBOX_API + '/files/list_folder';
  const body = scanCursor ? { cursor: scanCursor } : { path: scanFolder, recursive: true };

  console.log('[DBX] request:', url, JSON.stringify(body));

  let res;
  try { res = await dbFetch(url, body); }
  catch(e) { throw new Error('ネットワークエラー: ' + (e.message || String(e))); }

  console.log('[DBX] response status:', res.status);

  if (!res.ok) {
    let msg = 'HTTPステータス ' + res.status;
    try {
      const j = await res.json();
      console.log('[DBX] error body:', JSON.stringify(j));
      msg = j.error_summary || j.error || msg;
      if (res.status === 409) msg += '\nフォルダパスが存在しないか形式が正しくない可能性があります（先頭に / が必要）';
      if (res.status === 401) msg += '\nトークンが無効または期限切れです。新しいトークンを生成してください。';
    } catch(_) {}
    throw new Error('フォルダ取得エラー: ' + msg);
  }

  let data;
  try { data = await res.json(); }
  catch(e) { throw new Error('レスポンス解析エラー: ' + e.message); }

  console.log('[DBX] entries:', data.entries ? data.entries.length : 0, '/ has_more:', data.has_more);

  // 最初の10件をログに出してファイル種別を確認
  if (data.entries) {
    data.entries.slice(0, 10).forEach(e => {
      console.log('[DBX] entry:', e['.tag'], e.name, e.path_lower || '');
    });
  }

  for (const entry of (data.entries || [])) {
    if (entry['.tag'] === 'file') {
      const ext = (entry.name.split('.').pop() || '').toLowerCase();
      console.log('[DBX] file ext:', ext, entry.name);
      if (IMG_EXT.has(ext)) {
        totalFound++;
        if (files.length < BATCH_SIZE) {
          files.push({ path: entry.path_lower, name: entry.name });
        }
      }
    } else if (entry['.tag'] === 'folder') {
      folderCount++;
    }
  }
  console.log('[DBX] totalFound so far:', totalFound, '/ files:', files.length);
  scanCursor = data.cursor || null;
  scanDone = !data.has_more;
}

// バックグラウンドスキャン：BATCH_SIZEに達したら停止
async function bgScan() {
  if (scanRunning || scanDone) return;
  scanRunning = true;
  let retries = 0;
  while (!scanDone && files.length < BATCH_SIZE) {
    try {
      await fetchOnePage();
      retries = 0;
      updateFolderBadge();
      updateStats();
      // キューに新しいインデックスをランダムに挿入
      for (let i = queue.length; i < files.length; i++) {
        const pos = Math.floor(Math.random() * (queue.length - queuePos + 1)) + queuePos;
        queue.splice(pos, 0, i);
      }
      await sleep(50); // UIをブロックしないよう少し待つ
    } catch(e) {
      retries++;
      if (retries > 5) { console.warn('バックグラウンド取得中断:', e.message); break; }
      await sleep(2000 * retries);
    }
  }
  scanRunning = false;
  updateFolderBadge();
  updateStats();
}

function buildQueue() {
  queue = [...Array(files.length).keys()];
  // Fisher-Yates shuffle
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  queuePos = 0;
}

function updateFolderBadge() {
  const f = document.getElementById('input-folder').value.trim() || '/';
  const label = (f === '/' ? 'すべて' : f);
  const count = totalFound >= BATCH_SIZE
    ? BATCH_SIZE + '枚 (上限)'
    : totalFound + '枚' + (scanDone ? '' : ' 取得中...');
  document.getElementById('folder-badge').textContent = label + '  (' + count + ')';
}

// ===== LOADING =====
function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg || '読み込み中...';
  document.getElementById('loading').classList.remove('hidden');
}
function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}
function setLoadingMsg(msg) {
  const el = document.getElementById('loading-msg');
  if (el) el.textContent = msg;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showError(msg) {
  const el = document.getElementById('setup-error');
  el.style.whiteSpace = 'pre-wrap';
  el.textContent = msg; el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== DROPBOX API =====
async function dbFetch(url, body, method='POST') {
  return fetch(url, {
    method,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: method === 'POST' ? JSON.stringify(body) : undefined
  });
}

// ===== URL CACHE =====
function clearCache() {
  urlCache.forEach(u => URL.revokeObjectURL(u));
  urlCache.clear();
}
async function getURL(i) {
  if (urlCache.has(i)) return urlCache.get(i);
  const res = await fetch(DROPBOX_CONTENT + '/files/download', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Dropbox-API-Arg': JSON.stringify({ path: files[i].path })
    }
  });
  if (!res.ok) throw new Error('画像取得失敗: ' + files[i].path);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  urlCache.set(i, url);
  if (urlCache.size > 30) {
    const first = urlCache.keys().next().value;
    URL.revokeObjectURL(urlCache.get(first));
    urlCache.delete(first);
  }
  return url;
}

// ===== SHUFFLE =====
function shuffleAll() {
  if (!files.length) return;
  history = []; histIdx = -1; shown = 0;
  document.getElementById('history-list').innerHTML = '';
  document.getElementById('filmstrip').innerHTML = '';
  clearCache();
  buildQueue();
  updateStats();
  showCurrent();
}

// ===== SHOW =====
async function showCurrent() {
  if (!files.length) return;
  const fi = queue[queuePos % queue.length];
  const img = document.getElementById('main-img');
  img.classList.remove('loaded');
  try {
    const url = await getURL(fi);
    img.src = url;
    img.onload = () => img.classList.add('loaded');
    document.getElementById('img-path').textContent = files[fi].path;
    document.getElementById('img-counter').textContent = (queuePos + 1) + ' / ' + (totalFound || files.length);

    if (histIdx < 0 || history[histIdx] !== queuePos) {
      history = history.slice(0, histIdx + 1);
      history.push(queuePos);
      histIdx = history.length - 1;
      addHistItem(url, files[fi].name, histIdx);
      addFilmThumb(url, histIdx);
    }
    shown = Math.max(shown, histIdx + 1);
    updateStats();
    updateActive();
    // prefetch next
    const nextFi = queue[(queuePos + 1) % queue.length];
    if (nextFi !== undefined) getURL(nextFi).catch(() => {});
  } catch(e) {
    console.error(e);
    queuePos = (queuePos + 1) % queue.length;
    showCurrent();
  }
}

function nextImg() {
  if (!files.length) return;
  if (histIdx < history.length - 1) {
    histIdx++;
    queuePos = history[histIdx];
    updateActive(); showCurrent(); return;
  }
  queuePos = (queuePos + 1) % queue.length;
  showCurrent();
}
function prevImg() {
  if (!files.length || histIdx <= 0) return;
  histIdx--;
  queuePos = history[histIdx];
  updateActive(); showCurrent();
}

// ===== HISTORY =====
function addHistItem(url, name, pos) {
  const list = document.getElementById('history-list');
  list.querySelectorAll('.hist-item').forEach(d => d.classList.remove('active'));
  const div = document.createElement('div');
  div.className = 'hist-item active'; div.dataset.pos = pos;
  div.innerHTML = `<img src="${url}" alt=""><span class="hi-name">${escHtml(name)}</span>`;
  div.onclick = () => jumpTo(+div.dataset.pos);
  list.appendChild(div);
  if (list.children.length > 50) list.removeChild(list.firstChild);
  div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function addFilmThumb(url, pos) {
  const strip = document.getElementById('filmstrip');
  strip.querySelectorAll('.fs-thumb').forEach(t => t.classList.remove('active'));
  const img = document.createElement('img');
  img.src = url; img.className = 'fs-thumb active'; img.dataset.pos = pos;
  img.onclick = e => { e.stopPropagation(); jumpTo(+img.dataset.pos); };
  strip.appendChild(img);
  if (strip.children.length > 40) strip.removeChild(strip.firstChild);
  img.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'end' });
}

function jumpTo(pos) { histIdx = pos; queuePos = history[pos]; updateActive(); showCurrent(); }
function updateActive() {
  document.querySelectorAll('.hist-item').forEach(d => d.classList.toggle('active', +d.dataset.pos === histIdx));
  document.querySelectorAll('.fs-thumb').forEach(t => t.classList.toggle('active', +t.dataset.pos === histIdx));
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== AUTO =====
function toggleAuto() {
  const sbBtn = document.getElementById('btn-auto-sb');
  const mbBtn = document.getElementById('btn-auto-mb');
  const sbIcon = document.getElementById('auto-icon-sb');
  const mbIcon = document.getElementById('auto-icon-mb');
  if (autoTimer) {
    clearInterval(autoTimer); autoTimer = null;
    [sbBtn, mbBtn].forEach(b => { if(b) b.classList.remove('active'); });
    const play = '<polygon points="5 3 19 12 5 21 5 3"/>';
    if(sbIcon) sbIcon.innerHTML = play;
    if(mbIcon) mbIcon.innerHTML = play;
  } else {
    if (!files.length) { alert('先にDropboxに接続してください。'); return; }
    autoTimer = setInterval(nextImg, autoSpeed);
    [sbBtn, mbBtn].forEach(b => { if(b) b.classList.add('active'); });
    const pause = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    if(sbIcon) sbIcon.innerHTML = pause;
    if(mbIcon) mbIcon.innerHTML = pause;
  }
}

function updateSpeed(v) {
  autoSpeed = v * 1000;
  document.getElementById('speed-val').textContent = v;
  const mbv = document.getElementById('mb-speed-val');
  if (mbv) mbv.textContent = v;
  document.getElementById('speed-range').value = v;
  document.getElementById('mb-speed-range').value = v;
  if (autoTimer) { clearInterval(autoTimer); autoTimer = setInterval(nextImg, autoSpeed); }
}

// ===== STATS =====
function updateStats() {
  const total = totalFound || files.length;
  document.getElementById('s-total').textContent = total ? (total + (scanDone ? '' : '+')) : '—';
  document.getElementById('s-folders').textContent = folderCount || '—';
  document.getElementById('s-shown').textContent = shown || '—';
  document.getElementById('s-cur').textContent = files.length ? (queuePos + 1) + ' / ' + (total || '?') : '—';
}

// ===== SIZE SLIDER =====
function updateSize(v) {
  document.getElementById('size-val').textContent = v + '%';
  document.getElementById('img-stage').style.height = v + 'vh';
}

// ===== DRAG RESIZE =====
(function() {
  const handle = document.getElementById('resize-handle');
  const stage = document.getElementById('img-stage');
  let dragging = false, startY = 0, startH = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY; startH = stage.getBoundingClientRect().height;
    document.body.style.cursor = 'ns-resize'; document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const vh = window.innerHeight / 100;
    const v = Math.max(15, Math.min(92, Math.round((startH + (e.clientY - startY)) / vh)));
    stage.style.height = v + 'vh';
    document.getElementById('size-range').value = v;
    document.getElementById('size-val').textContent = v + '%';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return; dragging = false;
    document.body.style.cursor = ''; document.body.style.userSelect = '';
  });
  handle.addEventListener('touchstart', e => {
    dragging = true; startY = e.touches[0].clientY; startH = stage.getBoundingClientRect().height;
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const vh = window.innerHeight / 100;
    const v = Math.max(15, Math.min(92, Math.round((startH + (e.touches[0].clientY - startY)) / vh)));
    stage.style.height = v + 'vh';
    document.getElementById('size-range').value = v;
    document.getElementById('size-val').textContent = v + '%';
  }, { passive: false });
  document.addEventListener('touchend', () => { dragging = false; });
})();

// ===== SWIPE (iPad) =====
(function() {
  const stage = document.getElementById('img-stage');
  let startX = 0, startY = 0;
  stage.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
  }, { passive: true });
  stage.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      dx < 0 ? nextImg() : prevImg();
    }
  }, { passive: true });
})();

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextImg(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevImg(); }
  if (e.key === 'Enter') toggleAuto();
  if (e.key === 'r' || e.key === 'R') shuffleAll();
});
</script>
